name: Build Android APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ICON_URL: "https://i.ibb.co/0j4yFzqM/38b2b0d4186c.jpg"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install --force

      - name: Build Web Project
        run: |
          npm run build -- --base=./ || npm run build || true
          if [ ! -d "dist" ]; then
            mkdir -p dist
            cp index.html dist/ 2>/dev/null || true
          fi

      - name: Setup Capacitor Config
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

          cat <<EOF > capacitor.config.json
          {
            "appId": "com.ec.aoo",
            "appName": "testapp",
            "webDir": "dist",
            "server": {
              "androidScheme": "https",
              "hostname": "localhost",
              "cleartext": true
            }
          }
          EOF

          npx cap add android || true
          npx cap sync android

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Download and Apply Custom Icon
        run: |
          curl -L "$ICON_URL" -o custom_icon.png

          declare -A sizes=(
            ["mipmap-mdpi"]=48
            ["mipmap-hdpi"]=72
            ["mipmap-xhdpi"]=96
            ["mipmap-xxhdpi"]=144
            ["mipmap-xxxhdpi"]=192
          )

          for folder in "${!sizes[@]}"; do
            size=${sizes[$folder]}
            dir="android/app/src/main/res/$folder"
            mkdir -p "$dir"
            convert custom_icon.png -resize "${size}x${size}" "$dir/ic_launcher.png"
            convert custom_icon.png -resize "${size}x${size}" "$dir/ic_launcher_round.png"
          done

          # Foreground layer (adaptive icon)
          for folder in "${!sizes[@]}"; do
            size=${sizes[$folder]}
            dir="android/app/src/main/res/$folder"
            convert custom_icon.png -resize "${size}x${size}" "$dir/ic_launcher_foreground.png"
          done

      - name: Build Android APK
        run: |
          cd android

          echo "configurations.all {
              resolutionStrategy.eachDependency { DependencyResolveDetails details ->
                  if (details.requested.group == 'org.jetbrains.kotlin') {
                      details.useVersion '1.8.22'
                  }
              }
          }" >> app/build.gradle

          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-App-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
