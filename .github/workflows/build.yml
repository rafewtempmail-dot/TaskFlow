name: Build Android APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ICON_URL: "https://i.ibb.co/0j4yFzqM/38b2b0d4186c.jpg"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install --force

      - name: Build Web Project
        run: |
          npm run build -- --base=./ || npm run build || true
          if [ ! -d "dist" ]; then
            mkdir -p dist
            cp index.html dist/ 2>/dev/null || true
          fi

      - name: Setup Capacitor Config
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

          cat <<EOF > capacitor.config.json
          {
            "appId": "com.ec5.aoo",
            "appName": "To New",
            "webDir": "dist",
            "server": {
              "androidScheme": "https",
              "hostname": "localhost",
              "cleartext": true
            }
          }
          EOF

          npx cap add android || true
          npx cap sync android

      - name: Download and Apply Custom Icon
        run: |
          pip install Pillow --quiet
          curl -L "$ICON_URL" -o custom_icon.png

          python3 << 'PYEOF'
          from PIL import Image
          import os

          sizes = {
            "mipmap-mdpi": 48,
            "mipmap-hdpi": 72,
            "mipmap-xhdpi": 96,
            "mipmap-xxhdpi": 144,
            "mipmap-xxxhdpi": 192,
          }

          img = Image.open("custom_icon.png").convert("RGBA")

          for folder, size in sizes.items():
            dir_path = f"android/app/src/main/res/{folder}"
            os.makedirs(dir_path, exist_ok=True)
            resized = img.resize((size, size), Image.LANCZOS)
            resized.save(f"{dir_path}/ic_launcher.png")
            resized.save(f"{dir_path}/ic_launcher_round.png")
            resized.save(f"{dir_path}/ic_launcher_foreground.png")

          print("Icons applied successfully!")
          PYEOF

      - name: Build Android APK
        run: |
          cd android

          echo "configurations.all {
              resolutionStrategy.eachDependency { DependencyResolveDetails details ->
                  if (details.requested.group == 'org.jetbrains.kotlin') {
                      details.useVersion '1.8.22'
                  }
              }
          }" >> app/build.gradle

          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-App-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
