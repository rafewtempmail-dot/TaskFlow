name: Build Android APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Create package.json
        run: |
          cat <<EOF > package.json
          {
            "name": "myapp",
            "version": "1.0.0",
            "scripts": {
              "build": "echo build done"
            },
            "dependencies": {}
          }
          EOF

      - name: Install Dependencies
        run: npm install --force

      - name: Prepare dist folder
        run: |
          mkdir -p dist
          cp index.html dist/ 2>/dev/null || true
          cp app.js dist/ 2>/dev/null || true
          cp styles.css dist/ 2>/dev/null || true

      - name: Setup Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android --force

          cat <<EOF > capacitor.config.json
          {
            "appId": "com.mya535pp.taskflow",
            "appName": "Task Flow",
            "webDir": "dist",
            "server": {
              "androidScheme": "https"
            }
          }
          EOF

          npx cap add android || true
          npx cap sync android

      - name: Download and Apply Custom Icon
        run: |
          pip install Pillow --quiet
          curl -L "https://i.ibb.co/0j4yFzqM/38b2b0d4186c.jpg" -o custom_icon.png

          python3 << 'PYEOF'
          from PIL import Image
          import os

          sizes = {
            "mipmap-mdpi": 48,
            "mipmap-hdpi": 72,
            "mipmap-xhdpi": 96,
            "mipmap-xxhdpi": 144,
            "mipmap-xxxhdpi": 192,
          }

          img = Image.open("custom_icon.png").convert("RGBA")

          for folder, size in sizes.items():
            dir_path = f"android/app/src/main/res/{folder}"
            os.makedirs(dir_path, exist_ok=True)
            resized = img.resize((size, size), Image.LANCZOS)
            resized.save(f"{dir_path}/ic_launcher.png")
            resized.save(f"{dir_path}/ic_launcher_round.png")
            resized.save(f"{dir_path}/ic_launcher_foreground.png")

          print("Icons applied!")
          PYEOF

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlow-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
