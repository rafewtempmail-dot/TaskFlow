name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP_NAME: "TaskFlow"
      APP_ID: "com.taskflow.app"
      IMAGE_URL: "https://i.ibb.co/4RCrrzsb/bbe2141eda57.png"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Project
        run: |
          # package.json না থাকলে তৈরি করে নেবে
          echo '{"name": "taskflow", "dependencies": {}}' > package.json
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets --force
          
          # ফাইল সাজানো
          mkdir -p dist resources
          cp index.html styles.css app.js dist/ 2>/dev/null || true
          
          # আইকন ডাউনলোড
          curl -L "${{ env.IMAGE_URL }}" -o resources/icon.png
          
          # কনফিগারেশন
          cat <<EOF > capacitor.config.json
          {
            "appId": "${{ env.APP_ID }}",
            "appName": "${{ env.APP_NAME }}",
            "webDir": "dist",
            "server": { "androidScheme": "https" }
          }
          EOF
          
          npx cap add android || true
          npx capacitor-assets generate --android || true
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlow-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
